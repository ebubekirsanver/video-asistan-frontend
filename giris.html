<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduAssistant | Giris</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 220ms ease, color 220ms ease;
    }

    html.dark body {
      background: #020617 !important;
      color: #e2e8f0 !important;
    }

    html.dark .bg-white {
      background-color: #0f172a !important;
      border-color: #334155 !important;
    }

    html.dark .bg-slate-100,
    html.dark .bg-slate-50 {
      background-color: #111827 !important;
    }

    html.dark .border-slate-100,
    html.dark .border-slate-200,
    html.dark .border-slate-300 {
      border-color: #334155 !important;
    }

    html.dark .text-slate-900 { color: #f8fafc !important; }
    html.dark .text-slate-700 { color: #cbd5e1 !important; }
    html.dark .text-slate-600,
    html.dark .text-slate-500 { color: #94a3b8 !important; }

    html.dark input {
      background-color: #0b1220 !important;
      border-color: #334155 !important;
      color: #e2e8f0 !important;
    }

    html.dark input::placeholder {
      color: #64748b;
    }

    html.dark .hover\:bg-slate-100:hover {
      background-color: #1e293b !important;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-indigo-50 text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-4">
    <section class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-xl p-8">
      <div class="mb-8">
        <p class="text-xs uppercase tracking-[0.2em] text-indigo-600 font-semibold">EduAssistant</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight">Hos geldiniz</h1>
        <p class="mt-2 text-sm text-slate-500">Once kayit olun, sonra kayitli hesapla giris yapin.</p>
      </div>

      <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-lg mb-6">
        <button id="registerTab" type="button" class="rounded-md bg-white shadow-sm text-slate-900 text-sm font-semibold py-2 transition-colors">Kayit Ol</button>
        <button id="loginTab" type="button" class="rounded-md text-slate-600 text-sm font-semibold py-2 transition-colors">Giris Yap</button>
      </div>

      <div id="statusMessage" class="hidden mb-4 text-sm rounded-lg px-3 py-2"></div>

      <form id="registerForm" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="regName">Ad Soyad</label>
          <input id="regName" name="regName" type="text" required placeholder="Ornek Kullanici" class="w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="regEmail">E-posta</label>
          <input id="regEmail" name="regEmail" type="email" required placeholder="ornek@mail.com" class="w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="regPassword">Sifre</label>
          <div class="relative">
            <input id="regPassword" name="regPassword" type="password" required minlength="6" placeholder="En az 6 karakter" class="w-full rounded-lg border-slate-300 pr-20 focus:border-indigo-500 focus:ring-indigo-500" />
            <button id="regPasswordToggle" type="button" class="absolute inset-y-0 right-2 my-1 px-2 rounded text-xs font-semibold text-slate-600 hover:bg-slate-100">Goster</button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="regPasswordConfirm">Sifre Tekrar</label>
          <div class="relative">
            <input id="regPasswordConfirm" name="regPasswordConfirm" type="password" required minlength="6" placeholder="Sifrenizi tekrar yazin" class="w-full rounded-lg border-slate-300 pr-20 focus:border-indigo-500 focus:ring-indigo-500" />
            <button id="regPasswordConfirmToggle" type="button" class="absolute inset-y-0 right-2 my-1 px-2 rounded text-xs font-semibold text-slate-600 hover:bg-slate-100">Goster</button>
          </div>
        </div>

        <button type="submit" class="w-full rounded-lg bg-indigo-600 text-white font-semibold py-3 hover:bg-indigo-700 transition-colors">
          Kaydi Tamamla
        </button>
      </form>

      <form id="loginForm" class="space-y-4 hidden" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="loginEmail">E-posta</label>
          <input id="loginEmail" name="loginEmail" type="email" required placeholder="ornek@mail.com" class="w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="loginPassword">Sifre</label>
          <div class="relative">
            <input id="loginPassword" name="loginPassword" type="password" required placeholder="********" class="w-full rounded-lg border-slate-300 pr-20 focus:border-indigo-500 focus:ring-indigo-500" />
            <button id="loginPasswordToggle" type="button" class="absolute inset-y-0 right-2 my-1 px-2 rounded text-xs font-semibold text-slate-600 hover:bg-slate-100">Goster</button>
          </div>
        </div>

        <button type="submit" class="w-full rounded-lg bg-indigo-600 text-white font-semibold py-3 hover:bg-indigo-700 transition-colors">
          Giris Yap
        </button>
      </form>

      <div class="mt-6 flex items-center justify-center text-sm gap-3 flex-wrap border-t border-slate-100 pt-4">
        <a href="uyelik.html" class="text-slate-600 hover:text-slate-900 font-medium">Uyelik Paketleri ve Ozellikler</a>
      </div>
    </section>
  </main>

  <script>
    const THEME_KEY = 'edua_theme';
    const STORAGE_KEY = 'edua_registered_user';

    const registerTab = document.getElementById('registerTab');
    const loginTab = document.getElementById('loginTab');
    const registerForm = document.getElementById('registerForm');
    const loginForm = document.getElementById('loginForm');
    const statusMessage = document.getElementById('statusMessage');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');

    function applyTheme(theme) {
      const isDark = theme === 'dark';
      document.documentElement.classList.toggle('dark', isDark);
      document.documentElement.classList.toggle('light', !isDark);
    }

    applyTheme(localStorage.getItem(THEME_KEY) || 'light');

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-emerald-50', 'text-emerald-700', 'bg-slate-100', 'text-slate-700');

      if (type === 'error') {
        statusMessage.classList.add('bg-red-50', 'text-red-700');
        return;
      }

      if (type === 'success') {
        statusMessage.classList.add('bg-emerald-50', 'text-emerald-700');
        return;
      }

      statusMessage.classList.add('bg-slate-100', 'text-slate-700');
    }

    function activateTab(target) {
      const isRegister = target === 'register';

      registerForm.classList.toggle('hidden', !isRegister);
      loginForm.classList.toggle('hidden', isRegister);

      registerTab.classList.toggle('bg-white', isRegister);
      registerTab.classList.toggle('shadow-sm', isRegister);
      registerTab.classList.toggle('text-slate-900', isRegister);
      registerTab.classList.toggle('text-slate-600', !isRegister);

      loginTab.classList.toggle('bg-white', !isRegister);
      loginTab.classList.toggle('shadow-sm', !isRegister);
      loginTab.classList.toggle('text-slate-900', !isRegister);
      loginTab.classList.toggle('text-slate-600', isRegister);
    }

    function wirePasswordToggle(buttonId, inputId) {
      const toggleButton = document.getElementById(buttonId);
      const input = document.getElementById(inputId);

      toggleButton.addEventListener('click', function () {
        const shouldShow = input.type === 'password';
        input.type = shouldShow ? 'text' : 'password';
        toggleButton.textContent = shouldShow ? 'Gizle' : 'Goster';
      });
    }

    registerTab.addEventListener('click', function () {
      activateTab('register');
      showStatus('Once kayit olusturun, sonra giris yapin.', 'info');
    });

    loginTab.addEventListener('click', function () {
      activateTab('login');
    });

    registerForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const fullName = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;

      if (!fullName || !email || !password || !passwordConfirm) {
        showStatus('Tum alanlari doldurmaniz gerekiyor.', 'error');
        return;
      }

      if (password.length < 6) {
        showStatus('Sifre en az 6 karakter olmali.', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        showStatus('Sifreler ayni degil, lutfen kontrol edin.', 'error');
        return;
      }

      const user = {
        fullName,
        email,
        password
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
      loginEmail.value = email;
      loginPassword.value = '';
      registerForm.reset();

      activateTab('login');
      showStatus('Kayit tamamlandi. Simdi kayitli hesapla giris yapabilirsiniz.', 'success');
    });

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const rawUser = localStorage.getItem(STORAGE_KEY);
      if (!rawUser) {
        activateTab('register');
        showStatus('Giris yapmadan once bir hesap olusturmaniz gerekiyor.', 'error');
        return;
      }

      const user = JSON.parse(rawUser);
      const email = loginEmail.value.trim().toLowerCase();
      const password = loginPassword.value;

      if (email !== user.email || password !== user.password) {
        showStatus('E-posta veya sifre hatali. Lutfen tekrar deneyin.', 'error');
        return;
      }

      showStatus('Giris basarili. Islem sayfasina yonlendiriliyorsunuz...', 'success');
      window.setTimeout(function () {
        window.location.href = 'islem.html';
      }, 500);
    });

    wirePasswordToggle('regPasswordToggle', 'regPassword');
    wirePasswordToggle('regPasswordConfirmToggle', 'regPasswordConfirm');
    wirePasswordToggle('loginPasswordToggle', 'loginPassword');

    const existingUser = localStorage.getItem(STORAGE_KEY);
    if (existingUser) {
      const user = JSON.parse(existingUser);
      activateTab('login');
      loginEmail.value = user.email;
      showStatus('Kayitli hesap bulundu. Sifrenizi girerek devam edin.', 'info');
    } else {
      activateTab('register');
      showStatus('Hesap olusturarak baslayin.', 'info');
    }

    window.addEventListener('storage', function (event) {
      if (event.key === THEME_KEY) {
        applyTheme(event.newValue || 'light');
      }
    });
  </script>
</body>
</html>
