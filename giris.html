<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAssistant | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#f0f4ff',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        },
                        accent: {
                            500: '#06b6d4',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(263, 83%, 95%, 1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(188, 94%, 95%, 1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .premium-card {
            background: #ffffff;
            border-radius: 60px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.05);
            padding: 60px 40px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .tab-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 50px;
        }

        .tab-btn {
            padding: 14px 32px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #f0f4ff;
            color: #7c3aed;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            margin-left: 4px;
        }

        .input-field {
            background: #f0f4ff;
            border: 1.5px solid #d1d9e6;
            border-radius: 0px; /* Matching the sharp internal corners in some cases, but actually looks rounded in image, let's keep a small radius or none if needed */
            border-radius: 4px;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            width: 100%;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #7c3aed;
            background: #ffffff;
        }

        .btn-mega {
            background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
            color: white;
            border-radius: 30px;
            padding: 22px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }

        .btn-mega:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .status-msg {
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .status-success { background: #f0fdf4; color: #15803d; }
        .status-error { background: #fef2f2; color: #b91c1c; }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Logo -->
        <div class="mb-5 flex flex-col items-center">
            <a href="index.html" class="flex flex-col items-center gap-2">
                <div class="w-20 h-20 bg-brand-600 rounded-[28px] flex items-center justify-center shadow-xl shadow-brand-200">
                    <span class="material-symbols-outlined text-white text-[44px] font-light">school</span>
                </div>
                <div class="text-center mt-2">
                    <h2 class="text-3xl font-black font-outfit text-slate-950 tracking-tighter">EduAssistant</h2>
                    <p class="text-[9px] font-black uppercase tracking-[0.3em] text-brand-600 mt-0.5">Smart AI Education</p>
                </div>
            </a>
        </div>

        <div class="premium-card">
            <!-- Tabs -->
            <div class="tab-container">
                <button id="loginTabBtn" onclick="activateTab('login')" class="tab-btn active">Giriş Yap</button>
                <button id="registerTabBtn" onclick="activateTab('register')" class="tab-btn">Kayıt Ol</button>
            </div>

            <div id="statusMessage" class="hidden status-msg"></div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6" novalidate>
                <div class="input-group">
                    <label>E-posta Adresi</label>
                    <input id="loginEmail" name="loginEmail" type="email" required placeholder="test@example.com" class="input-field" />
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <div class="relative">
                        <input id="loginPassword" name="loginPassword" type="password" required placeholder="••••••" class="input-field pr-20" />
                        <button id="loginPasswordToggle" type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-brand-600 uppercase tracking-widest">Göster</button>
                    </div>
                </div>
                <button type="submit" class="btn-mega">Oturum Aç</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4 hidden" novalidate>
                <div class="input-group">
                    <label>Ad Soyad</label>
                    <input id="regName" name="regName" type="text" required placeholder="Örnek Kullanıcı" class="input-field" />
                </div>
                <div class="input-group">
                    <label>E-posta</label>
                    <input id="regEmail" name="regEmail" type="email" required placeholder="ornek@mail.com" class="input-field" />
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <div class="relative">
                        <input id="regPassword" name="regPassword" type="password" required minlength="6" placeholder="En az 6 karakter" class="input-field pr-20" />
                        <button id="regPasswordToggle" type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-brand-600 uppercase tracking-widest">Göster</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Şifre Tekrar</label>
                    <div class="relative">
                        <input id="regPasswordConfirm" name="regPasswordConfirm" type="password" required minlength="6" placeholder="Şifrenizi onaylayın" class="input-field pr-20" />
                        <button id="regPasswordConfirmToggle" type="button" class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-brand-600 uppercase tracking-widest">Göster</button>
                    </div>
                </div>
                <button type="submit" class="btn-mega">Hesap Oluştur</button>
            </form>

            <p class="footer-text">Yapay zeka ile öğrenme deneyimine katılın.</p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'edua_registered_user';
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTabBtn = document.getElementById('loginTabBtn');
        const registerTabBtn = document.getElementById('registerTabBtn');
        const statusMessage = document.getElementById('statusMessage');

        function activateTab(target) {
            const isLogin = target === 'login';
            loginForm.classList.toggle('hidden', !isLogin);
            registerForm.classList.toggle('hidden', isLogin);
            loginTabBtn.classList.toggle('active', isLogin);
            registerTabBtn.classList.toggle('active', !isLogin);
            statusMessage.classList.add('hidden');
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-msg ${type === 'error' ? 'status-error' : 'status-success'}`;
            statusMessage.classList.remove('hidden');
        }

        function wireToggle(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', () => {
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                btn.textContent = isPass ? 'Gizle' : 'Göster';
            });
        }

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const fullName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;

            if (!fullName || !email || !password || !confirm) return showStatus('Lütfen tüm alanları doldurun.', 'error');
            if (password !== confirm) return showStatus('Şifreler uyuşmuyor.', 'error');

            localStorage.setItem(STORAGE_KEY, JSON.stringify({ fullName, email, password }));
            activateTab('login');
            showStatus('Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            const user = JSON.parse(localStorage.getItem(STORAGE_KEY));

            if (!user || email !== user.email || password !== user.password) return showStatus('Hatalı e-posta veya şifre.', 'error');

            localStorage.setItem('edua_current_user', email);
            showStatus('Giriş başarılı!', 'success');
            setTimeout(() => window.location.href = 'islem.html', 500);
        });

        wireToggle('loginPasswordToggle', 'loginPassword');
        wireToggle('regPasswordToggle', 'regPassword');
        wireToggle('regPasswordConfirmToggle', 'regPasswordConfirm');

        const user = localStorage.getItem(STORAGE_KEY);
        if (user) activateTab('login'); else activateTab('register');
    </script>
</body>
</html>
